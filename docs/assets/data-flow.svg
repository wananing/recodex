<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="340" viewBox="0 0 1200 340" role="img" aria-labelledby="title desc">
  <title id="title">recodex data flow</title>
  <desc id="desc">Data flow from Codex transcript to local parser, facts, rulebase, optional LLM, JSON and HTML report.</desc>
  <defs>
    <linearGradient id="line" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#166534"/>
      <stop offset=".5" stop-color="#1d4ed8"/>
      <stop offset="1" stop-color="#b45309"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="340" fill="#f8fafc"/>
  <rect x="42" y="44" width="1116" height="252" rx="18" fill="#ffffff" stroke="#dbe3ee"/>
  <text x="70" y="88" font-family="ui-sans-serif, system-ui" font-size="26" font-weight="800" fill="#18202b">Data Flow</text>
  <text x="70" y="118" font-family="ui-sans-serif, system-ui" font-size="16" fill="#64748b">HTML 只展示 CLI 生成的结构化报告，不直接分析 transcript。</text>

  <g transform="translate(70 168)" font-family="ui-sans-serif, system-ui">
    <g>
      <rect width="132" height="72" rx="10" fill="#f8fafc" stroke="#d9e1ec"/>
      <text x="18" y="32" font-size="16" font-weight="800" fill="#18202b">Codex</text>
      <text x="18" y="54" font-size="14" fill="#64748b">JSONL</text>
    </g>
    <g transform="translate(168 0)">
      <rect width="132" height="72" rx="10" fill="#f8fafc" stroke="#d9e1ec"/>
      <text x="18" y="32" font-size="16" font-weight="800" fill="#18202b">Parser</text>
      <text x="18" y="54" font-size="14" fill="#64748b">stream parse</text>
    </g>
    <g transform="translate(336 0)">
      <rect width="132" height="72" rx="10" fill="#f8fafc" stroke="#d9e1ec"/>
      <text x="18" y="32" font-size="16" font-weight="800" fill="#18202b">Facts</text>
      <text x="18" y="54" font-size="14" fill="#64748b">signals</text>
    </g>
    <g transform="translate(504 0)">
      <rect width="132" height="72" rx="10" fill="#f0fdf4" stroke="#bbf7d0"/>
      <text x="18" y="32" font-size="16" font-weight="800" fill="#166534">Rulebase</text>
      <text x="18" y="54" font-size="14" fill="#64748b">diagnosis</text>
    </g>
    <g transform="translate(672 0)">
      <rect width="132" height="72" rx="10" fill="#eff6ff" stroke="#bfdbfe"/>
      <text x="18" y="32" font-size="16" font-weight="800" fill="#1d4ed8">LLM</text>
      <text x="18" y="54" font-size="14" fill="#64748b">optional</text>
    </g>
    <g transform="translate(840 0)">
      <rect width="132" height="72" rx="10" fill="#fff7ed" stroke="#fed7aa"/>
      <text x="18" y="32" font-size="16" font-weight="800" fill="#9a3412">report.json</text>
      <text x="18" y="54" font-size="14" fill="#64748b">structured</text>
    </g>
    <g transform="translate(1008 0)">
      <rect width="132" height="72" rx="10" fill="#f8fafc" stroke="#d9e1ec"/>
      <text x="18" y="32" font-size="16" font-weight="800" fill="#18202b">report.html</text>
      <text x="18" y="54" font-size="14" fill="#64748b">static page</text>
    </g>

    <path d="M138 36h26" stroke="url(#line)" stroke-width="4" stroke-linecap="round"/>
    <path d="M306 36h26" stroke="url(#line)" stroke-width="4" stroke-linecap="round"/>
    <path d="M474 36h26" stroke="url(#line)" stroke-width="4" stroke-linecap="round"/>
    <path d="M642 36h26" stroke="url(#line)" stroke-width="4" stroke-linecap="round"/>
    <path d="M810 36h26" stroke="url(#line)" stroke-width="4" stroke-linecap="round"/>
    <path d="M978 36h26" stroke="url(#line)" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
