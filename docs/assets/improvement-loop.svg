<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Improvement loop</title>
  <desc id="desc">The loop from retrospectives to reviewable improvements and workflow artifacts.</desc>
  <rect width="1200" height="420" fill="#f6f7f9"/>
  <text x="70" y="72" font-family="ui-sans-serif, system-ui" font-size="30" font-weight="800" fill="#18202b">持续改进闭环</text>
  <text x="70" y="106" font-family="ui-sans-serif, system-ui" font-size="17" fill="#64748b">不是总结聊天，而是把下一次要提醒 AI 的事情变成可复用工程资产。</text>

  <g transform="translate(600 218)" font-family="ui-sans-serif, system-ui" text-anchor="middle">
    <circle r="126" fill="#ffffff" stroke="#d9e1ec" stroke-width="2"/>
    <circle r="54" fill="#f8fafc" stroke="#d9e1ec"/>
    <text y="-4" font-size="18" font-weight="800" fill="#18202b">Review</text>
    <text y="22" font-size="14" fill="#64748b">human-in-loop</text>

    <g transform="translate(0 -170)">
      <rect x="-98" y="-24" width="196" height="48" rx="24" fill="#eff6ff" stroke="#bfdbfe"/>
      <text y="6" font-size="16" font-weight="800" fill="#1d4ed8">Retrospective</text>
    </g>
    <g transform="translate(174 0)">
      <rect x="-98" y="-24" width="196" height="48" rx="24" fill="#fff7ed" stroke="#fed7aa"/>
      <text y="6" font-size="16" font-weight="800" fill="#b45309">Candidates</text>
    </g>
    <g transform="translate(0 170)">
      <rect x="-98" y="-24" width="196" height="48" rx="24" fill="#f0fdf4" stroke="#bbf7d0"/>
      <text y="6" font-size="16" font-weight="800" fill="#166534">Artifacts</text>
    </g>
    <g transform="translate(-174 0)">
      <rect x="-98" y="-24" width="196" height="48" rx="24" fill="#f8fafc" stroke="#d9e1ec"/>
      <text y="6" font-size="16" font-weight="800" fill="#334155">Next Session</text>
    </g>
  </g>

  <path d="M600 88a130 130 0 0 1 130 130" fill="none" stroke="#1d4ed8" stroke-width="5" stroke-linecap="round"/>
  <path d="M730 218a130 130 0 0 1-130 130" fill="none" stroke="#b45309" stroke-width="5" stroke-linecap="round"/>
  <path d="M600 348a130 130 0 0 1-130-130" fill="none" stroke="#166534" stroke-width="5" stroke-linecap="round"/>
  <path d="M470 218A130 130 0 0 1 600 88" fill="none" stroke="#64748b" stroke-width="5" stroke-linecap="round"/>

  <text x="865" y="198" font-family="ui-sans-serif, system-ui" font-size="16" fill="#475569">AGENTS.md</text>
  <text x="865" y="226" font-family="ui-sans-serif, system-ui" font-size="16" fill="#475569">checklists</text>
  <text x="865" y="254" font-family="ui-sans-serif, system-ui" font-size="16" fill="#475569">scripts · CI · skills</text>
</svg>
