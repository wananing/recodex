<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380" viewBox="0 0 1200 380" role="img" aria-labelledby="title desc">
  <title id="title">LLM providers</title>
  <desc id="desc">Optional LLM providers for recodex: mock, OpenAI and Volcengine Ark.</desc>
  <rect width="1200" height="380" fill="#f8fafc"/>
  <rect x="58" y="44" width="1084" height="292" rx="18" fill="#ffffff" stroke="#dbe3ee"/>
  <text x="88" y="90" font-family="ui-sans-serif, system-ui" font-size="30" font-weight="800" fill="#18202b">可选 LLM 接入</text>
  <text x="88" y="124" font-family="ui-sans-serif, system-ui" font-size="17" fill="#64748b">LLM 只处理脱敏后的结构化分析包，不直接吃全量 transcript。</text>

  <g transform="translate(88 168)" font-family="ui-sans-serif, system-ui">
    <rect width="286" height="128" rx="12" fill="#f8fafc" stroke="#d9e1ec"/>
    <text x="24" y="42" font-size="23" font-weight="800" fill="#18202b">Mock</text>
    <text x="24" y="76" font-size="16" fill="#64748b">测试用，无网络调用</text>
    <text x="24" y="104" font-size="15" fill="#64748b">--llm-provider mock</text>

    <rect x="356" width="286" height="128" rx="12" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="380" y="42" font-size="23" font-weight="800" fill="#1d4ed8">OpenAI</text>
    <text x="380" y="76" font-size="16" fill="#64748b">Structured Outputs</text>
    <text x="380" y="104" font-size="15" fill="#64748b">OPENAI_API_KEY</text>

    <rect x="712" width="286" height="128" rx="12" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="736" y="42" font-size="23" font-weight="800" fill="#b45309">Volcengine Ark</text>
    <text x="736" y="76" font-size="16" fill="#64748b">Doubao / 方舟</text>
    <text x="736" y="104" font-size="15" fill="#64748b">ARK_API_KEY</text>
  </g>
</svg>
